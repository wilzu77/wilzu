<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WILZU | NEOVERSE</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      overflow-x: hidden;
      color: #f0f0ff;
    }

    /* dynamic gradient background */
    .dynamic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, #0e0b1f, #010003);
    }

    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.12;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }

    /* animated orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 22s infinite alternate ease-in-out;
      z-index: -1;
    }
    .orb-1 { width: 55vw; height: 55vw; background: #7928ff; top: -20%; left: -20%; }
    .orb-2 { width: 45vw; height: 45vw; background: #ff4d8c; bottom: -25%; right: -15%; animation-duration: 28s; }
    .orb-3 { width: 35vw; height: 35vw; background: #00c9b6; bottom: 10%; left: 20%; animation-duration: 18s; opacity: 0.2; }
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 8%) scale(1.2); }
    }

    /* LOGIN SCREEN - GLASS ENHANCED */
    .login-prime {
      position: fixed;
      inset: 0;
      background: rgba(5, 3, 15, 0.75);
      backdrop-filter: blur(20px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      visibility: visible;
      opacity: 1;
    }
    .login-prime.hide-login {
      opacity: 0;
      visibility: hidden;
      backdrop-filter: blur(0px);
    }
    .glass-panel {
      background: rgba(18, 12, 34, 0.65);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid rgba(138, 92, 246, 0.5);
      padding: 2rem 2rem 2.2rem;
      width: 90%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(168, 85, 247, 0.2);
      transform: scale(0.96);
      animation: zoomGlow 0.5s ease forwards;
    }
    @keyframes zoomGlow {
      0% { opacity: 0; transform: scale(0.92) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .glass-panel h2 {
      font-size: 2.3rem;
      font-weight: 800;
      background: linear-gradient(130deg, #e6c8ff, #bc8eff, #ff8ed0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .glass-panel .brand-sub {
      color: #bba9ff;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .input-frost {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 3rem;
      padding: 0.9rem 1.2rem;
      width: 100%;
      margin-bottom: 1.2rem;
      color: white;
      font-size: 1rem;
      transition: all 0.25s;
      outline: none;
    }
    .input-frost:focus {
      border-color: #c35eff;
      box-shadow: 0 0 15px rgba(195, 94, 255, 0.4);
      background: rgba(255, 255, 255, 0.1);
    }
    .login-btn-glow {
      background: linear-gradient(95deg, #9a4eff, #da4eff);
      border: none;
      padding: 0.9rem;
      width: 100%;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      margin-top: 0.5rem;
      box-shadow: 0 8px 20px rgba(154, 78, 255, 0.4);
    }
    .login-btn-glow:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px #da4eff;
    }
    .demo-note {
      font-size: 0.7rem;
      margin-top: 1.3rem;
      opacity: 0.7;
    }
    .error-msg {
      color: #ff9494;
      font-size: 0.75rem;
      margin-top: 0.2rem;
      min-height: 1.5rem;
    }

    /* MAIN APP MODERN */
    .wilzu-dashboard {
      display: none;
      opacity: 0;
      transition: opacity 0.5s ease;
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem;
    }
    .wilzu-dashboard.active {
      display: block;
      opacity: 1;
    }
    /* header */
    .neo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(168, 85, 247, 0.3);
    }
    .logo-area h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(115deg, #ffffff, #dca5ff, #fa8eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .badge {
      background: rgba(138, 92, 246, 0.2);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      border: 1px solid rgba(168, 85, 247, 0.5);
      backdrop-filter: blur(4px);
    }
    /* video card premium */
    .media-card {
      background: rgba(15, 10, 30, 0.5);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      padding: 1.5rem;
      margin: 1.5rem 0;
      border: 1px solid rgba(168, 85, 247, 0.4);
      transition: 0.2s;
    }
    video {
      width: 100%;
      border-radius: 1.5rem;
      box-shadow: 0 20px 35px -10px black;
      cursor: pointer;
      transition: 0.2s;
    }
    video:hover {
      transform: scale(0.99);
      box-shadow: 0 0 0 2px #c084fc;
    }
    .action-bar {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .btn-modern {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(188, 120, 255, 0.5);
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }
    .btn-modern:hover {
      background: linear-gradient(135deg, #a855f7, #d946ef);
      border-color: transparent;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
    }
    select {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #aa66ff;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      color: white;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
    /* spotify widget modern */
    .spotify-embed {
      background: rgba(0, 0, 0, 0.45);
      border-radius: 2rem;
      padding: 0.2rem;
      margin: 1.8rem 0;
      border: 1px solid #cc88ff40;
    }
    iframe {
      border-radius: 1.8rem;
      width: 100%;
      height: 90px;
    }
    /* tiktok downloader v2 */
    .tiktok-glass {
      background: rgba(18, 12, 34, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.5rem;
      margin: 2rem 0;
      border: 1px solid rgba(200, 130, 255, 0.5);
    }
    .input-group-inline {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    .input-tiktok {
      flex: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #b27eff;
      border-radius: 3rem;
      padding: 0.8rem 1.2rem;
      color: white;
      outline: none;
    }
    .result-preview video {
      max-height: 350px;
      width: auto;
      margin-top: 1rem;
      border-radius: 1.2rem;
    }
    .download-link-neon {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: linear-gradient(95deg, #9945ff, #eb3eb0);
      padding: 0.6rem 1.5rem;
      border-radius: 3rem;
      text-decoration: none;
      color: white;
      font-weight: 600;
      margin-top: 1rem;
      transition: 0.2s;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      padding: 1rem;
      opacity: 0.6;
      font-size: 0.8rem;
    }
    .logout-neon {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      padding: 0.7rem 1.3rem;
      border-radius: 3rem;
      font-weight: 500;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid #ff80cc;
      transition: 0.2s;
      z-index: 99;
    }
    .logout-neon:hover {
      background: #ff4d8c;
      color: white;
      border-color: white;
    }
    @media (max-width: 680px) {
      .wilzu-dashboard { padding: 1rem; }
      .logo-area h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="dynamic-bg"></div>
<div class="noise"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- LOGIN SECTION PREMIUM -->
<div id="loginScreenV2" class="login-prime">
  <div class="glass-panel">
    <h2>WILZU NEO</h2>
    <div class="brand-sub">akses penuh ke dimensi baru</div>
    <input type="text" id="loginUsername" class="input-frost" placeholder="username / kamu" autocomplete="off">
    <input type="password" id="loginPassword" class="input-frost" placeholder="password (bebas)">
    <div id="loginErrorMsg" class="error-msg"></div>
    <button id="loginButtonV2" class="login-btn-glow"><i class="fas fa-arrow-right-to-bracket"></i> MASUK SEKARANG</button>
    <div class="demo-note">✨ cukup isi kedua field, langsung masuk ke pengalaman baru ✨</div>
  </div>
</div>

<!-- MAIN WEBSITE MODERN -->
<div id="mainAppModern" class="wilzu-dashboard">
  <div class="neo-header">
    <div class="logo-area">
      <h1>𝑾𝑰𝑳𝒁𝑼 𝑽𝑬𝑹𝑺𝑬</h1>
      <div class="badge"><i class="fas fa-bolt"></i> NEXT GEN PORTAL</div>
    </div>
    <div class="badge"><i class="fas fa-headphones"></i> SURE THING ON SPOTIFY</div>
  </div>

  <!-- Video + Menu -->
  <div class="media-card">
    <video id="heroVideo" poster="https://files.catbox.moe/avfc3q.jpg" controls>
      <source src="https://files.catbox.moe/mnrpbr.mp4" type="video/mp4">
    </video>
    <div class="action-bar">
      <select id="menuNeo">
        <option value="dashboard">✦ DASHBOARD</option>
        <option value="premium">💎 FITUR PREMIUM</option>
        <option value="about">🌌 TENTANG KAMI</option>
      </select>
      <button id="exploreBtn" class="btn-modern"><i class="fas fa-compass"></i> JELAJAHI</button>
      <button id="telegramNeoBtn" class="btn-modern" onclick="window.open('https://t.me/Willyishre_bot?start=_tgr_xPMBIpY5Yjhl','_blank')"><i class="fab fa-telegram"></i> BOT TELEGRAM</button>
    </div>
  </div>

  <!-- SPOTIFY WIDGET : SURE THING MIGUEL -->
  <div class="spotify-embed">
    <iframe src="https://open.spotify.com/embed/track/0Nxx0HZcPr3yprf9tPXAY3?utm_source=generator&theme=0" 
            frameborder="0" allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy"></iframe>
  </div>

  <!-- TikTok Downloader Upgrade -->
  <div class="tiktok-glass">
    <h3 style="display: flex; gap: 10px; align-items: center;"><i class="fab fa-tiktok" style="font-size: 1.5rem;"></i> UNDUH VIDEO TIKTOK</h3>
    <p>tempel link trus dapetin video & download</p>
    <div class="input-group-inline">
      <input type="text" id="tiktokLinkInput" class="input-tiktok" placeholder="https://www.tiktok.com/@user/video/123456789">
      <button id="tiktokFetchBtn" class="btn-modern"><i class="fas fa-download"></i> Proses</button>
    </div>
    <div id="tiktokResultContainer" class="result-preview" style="margin-top: 20px;"></div>
  </div>

  <footer>© 2025 WILZU • built with neo vibes • unlimited inspiration</footer>
  <div id="logoutNeonBtn" class="logout-neon"><i class="fas fa-sign-out-alt"></i> Keluar</div>
</div>

<script>
  (function() {
    // Login logic dengan efek smooth
    const loginContainer = document.getElementById('loginScreenV2');
    const mainApp = document.getElementById('mainAppModern');
    const loginBtn = document.getElementById('loginButtonV2');
    const userInput = document.getElementById('loginUsername');
    const passInput = document.getElementById('loginPassword');
    const errorSpan = document.getElementById('loginErrorMsg');

    function handleLogin() {
      const username = userInput.value.trim();
      const password = passInput.value.trim();
      if (username === "" || password === "") {
        errorSpan.innerText = "⚠️ isi kedua kolom (bebas) untuk masuk!";
        return;
      }
      // success login
      errorSpan.innerText = "";
      loginContainer.classList.add('hide-login');
      setTimeout(() => {
        loginContainer.style.display = 'none';
        mainApp.classList.add('active');
        document.body.style.overflow = 'auto';
        // play subtle entrance
      }, 700);
    }

    loginBtn.addEventListener('click', handleLogin);
    const enterKeyLogin = (e) => { if(e.key === 'Enter') handleLogin(); };
    userInput.addEventListener('keypress', enterKeyLogin);
    passInput.addEventListener('keypress', enterKeyLogin);

    // LOGOUT 
    const logoutBtn = document.getElementById('logoutNeonBtn');
    function logout() {
      mainApp.classList.remove('active');
      mainApp.style.display = 'none';
      loginContainer.style.display = 'flex';
      setTimeout(() => {
        loginContainer.classList.remove('hide-login');
        loginContainer.style.opacity = '1';
        loginContainer.style.visibility = 'visible';
      }, 10);
      userInput.value = '';
      passInput.value = '';
      errorSpan.innerText = '';
      document.body.style.overflow = 'hidden';
      // reset tiktok result
      const resultDiv = document.getElementById('tiktokResultContainer');
      if (resultDiv) resultDiv.innerHTML = '';
    }
    logoutBtn.addEventListener('click', logout);

    // MENU HANDLER
    const menuSelect = document.getElementById('menuNeo');
    const exploreButton = document.getElementById('exploreBtn');
    function showMenuInfo() {
      const selected = menuSelect.value;
      let msg = '';
      if (selected === 'dashboard') msg = "📊 DASHBOARD WILZU — Statistik: 15.2K tayangan, 890 user aktif, playlist favorit: Sure Thing 🔥";
      else if (selected === 'premium') msg = "💎 FITUR PREMIUM — Download video tanpa watermark, akses early content, tema eksklusif, dan badge neon. Chat bot Telegram!";
      else if (selected === 'about') msg = "🌌 TENTANG KAMI — Wilzu Neo adalah ruang imersif buat kamu yang suka estetika, video editor, dan downloader TikTok tanpa ribet. #FutureIsNow";
      else msg = "✨ Pilih menu yang tersedia.";
      alert(msg);
    }
    exploreButton.addEventListener('click', showMenuInfo);

    // TIKTOK DOWNLOADER ENHANCED (API tikwm)
    const tiktokInput = document.getElementById('tiktokLinkInput');
    const tiktokFetch = document.getElementById('tiktokFetchBtn');
    const resultContainer = document.getElementById('tiktokResultContainer');

    async function fetchTikTok() {
      const rawUrl = tiktokInput.value.trim();
      if (!rawUrl) {
        alert("Masukkan link TikTok dulu, ya!");
        return;
      }
      resultContainer.innerHTML = `<div style="display: flex; gap: 8px; justify-content:center; padding: 12px;"><i class="fas fa-circle-notch fa-spin"></i> Sedang mengambil data...</div>`;
      try {
        const encoded = encodeURIComponent(rawUrl);
        const response = await fetch(`https://tikwm.com/api/?url=${encoded}`);
        const data = await response.json();
        if (data && data.data && data.data.play) {
          const videoPlay = data.data.play;
          resultContainer.innerHTML = `
            <div style="background: rgba(0,0,0,0.4); border-radius: 1.5rem; padding: 1rem; text-align: center;">
              <i class="fas fa-check-circle" style="color: #c084fc;"></i> <strong>Video siap, lek!</strong><br>
              <video controls style="max-width: 100%; max-height: 360px; border-radius: 1rem; margin: 10px 0;">
                <source src="${videoPlay}" type="video/mp4">
              </video><br>
              <a href="${videoPlay}" download class="download-link-neon"><i class="fas fa-save"></i> Download Video</a>
            </div>
          `;
        } else {
          resultContainer.innerHTML = `<div style="color:#ffb7b7; padding: 12px;">⚠️ Gagal ambil video. Pastikan link publik dan benar.</div>`;
        }
      } catch (err) {
        console.error(err);
        resultContainer.innerHTML = `<div style="color:#ff8a8a;">💥 Error total, cek koneksi atau coba lagi nanti.</div>`;
      }
    }

    tiktokFetch.addEventListener('click', fetchTikTok);
    // video main
    const mainVideo = document.getElementById('heroVideo');
    if(mainVideo) {
      mainVideo.addEventListener('click', () => {
        if(mainVideo.paused) mainVideo.play(); else mainVideo.pause();
      });
    }

    // tambahan efek hover dan gaya
    console.log("wilzu neo ready | Sure Thing spotify integrated");
  })();
</script>
</body>
</html>
