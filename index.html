<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WILZU | NEOVERSE</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #ffffff;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Background dinamis dengan grain */
    .bg-prime {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #0f0c24, #020105);
      z-index: -2;
    }
    .grain {
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
      opacity: 0.4;
    }

    /* Animated orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      animation: floatOrb 25s infinite alternate;
      z-index: -1;
    }
    .orb1 { width: 50vw; height: 50vw; background: #8a2be2; top: -20%; left: -20%; }
    .orb2 { width: 40vw; height: 40vw; background: #ff3d9f; bottom: -20%; right: -15%; animation-duration: 30s; }
    .orb3 { width: 35vw; height: 35vw; background: #00d4ff; bottom: 10%; left: 30%; animation-duration: 20s; opacity: 0.2; }
    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(6%, 12%) scale(1.2); }
    }

    /* LOGIN SCREEN - SUPERIOR */
    .login-master {
      position: fixed;
      inset: 0;
      background: rgba(5, 3, 18, 0.82);
      backdrop-filter: blur(24px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      visibility: visible;
      opacity: 1;
    }
    .login-master.hidden {
      opacity: 0;
      visibility: hidden;
      backdrop-filter: blur(0);
    }
    .card-login {
      background: rgba(12, 8, 28, 0.65);
      backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      border: 1px solid rgba(138, 92, 246, 0.6);
      padding: 2rem 2rem 2.2rem;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(168, 85, 247, 0.3);
      transform: scale(0.96);
      animation: cardRise 0.5s ease forwards;
    }
    @keyframes cardRise {
      0% { opacity: 0; transform: scale(0.9) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .card-login h2 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f0e6ff, #c695ff, #ff9ce0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }
    .subtitle {
      color: #b9a9ff;
      margin-bottom: 1.8rem;
      font-weight: 500;
      font-size: 0.85rem;
    }
    .input-neo {
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(168, 85, 247, 0.4);
      border-radius: 3rem;
      padding: 0.9rem 1.3rem;
      width: 100%;
      margin-bottom: 1.2rem;
      color: white;
      font-size: 1rem;
      transition: all 0.25s;
      outline: none;
    }
    .input-neo:focus {
      border-color: #d946ef;
      box-shadow: 0 0 18px rgba(217, 70, 239, 0.5);
      background: rgba(255, 255, 255, 0.1);
    }
    .btn-neo {
      background: linear-gradient(100deg, #9945ff, #db3dff);
      border: none;
      padding: 0.9rem 1.5rem;
      width: 100%;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 8px 20px rgba(153, 69, 255, 0.4);
      position: relative;
      overflow: hidden;
    }
    .btn-neo::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.4s;
    }
    .btn-neo:hover::after {
      left: 100%;
    }
    .btn-neo:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px #db3dff;
    }
    .demo-text {
      font-size: 0.7rem;
      margin-top: 1.2rem;
      opacity: 0.7;
    }
    .error-login {
      color: #ff9595;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
    }

    /* MAIN APP MODERN ELEGANT */
    .wilzu-app {
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      max-width: 1300px;
      margin: 0 auto;
      padding: 1.5rem 2rem 2rem;
    }
    .wilzu-app.active {
      display: block;
      opacity: 1;
    }
    /* navbar premium */
    .glass-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      padding: 0.8rem 0 1.5rem;
      border-bottom: 1px solid rgba(168, 85, 247, 0.3);
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(125deg, #fff, #dc9eff, #ff99e2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .status-badge {
      background: rgba(138, 92, 246, 0.25);
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      backdrop-filter: blur(4px);
      border: 1px solid #a855f7;
    }
    /* video card */
    .video-verse {
      background: rgba(15, 10, 34, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(168, 85, 247, 0.3);
      transition: transform 0.2s;
    }
    video {
      width: 100%;
      border-radius: 1.5rem;
      box-shadow: 0 20px 30px -12px black;
      cursor: pointer;
    }
    .action-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .select-custom {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid #b77dff;
      border-radius: 3rem;
      padding: 0.7rem 1.8rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .select-custom:hover {
      border-color: #eb6eff;
    }
    .btn-glow {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border: 1px solid #a855f7;
      border-radius: 3rem;
      padding: 0.7rem 1.8rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-glow:hover {
      background: linear-gradient(95deg, #a855f7, #d946ef);
      border-color: transparent;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(168, 85, 247, 0.4);
    }
    /* Spotify card khusus */
    .music-floater {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(18px);
      border-radius: 2rem;
      padding: 0.5rem;
      margin: 2rem 0;
      border: 1px solid rgba(217, 70, 239, 0.5);
      transition: all 0.3s;
    }
    iframe {
      border-radius: 1.5rem;
      width: 100%;
      height: 90px;
    }
    /* TikTok modern */
    .tiktok-neo {
      background: rgba(20, 12, 38, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.6rem;
      margin: 2rem 0;
      border: 1px solid rgba(168, 85, 247, 0.5);
    }
    .flex-input {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      align-items: center;
      margin: 1rem 0;
    }
    .input-urban {
      flex: 1;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #c084fc;
      border-radius: 3rem;
      padding: 0.85rem 1.2rem;
      color: white;
      outline: none;
    }
    .result-video {
      margin-top: 1rem;
      text-align: center;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: linear-gradient(95deg, #9945ff, #f43f99);
      padding: 0.7rem 1.8rem;
      border-radius: 3rem;
      text-decoration: none;
      color: white;
      font-weight: 700;
      margin-top: 1rem;
      transition: 0.2s;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      opacity: 0.6;
      font-size: 0.8rem;
    }
    .logout-zone {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      padding: 0.7rem 1.3rem;
      border-radius: 3rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #ff80cc;
      transition: 0.2s;
      z-index: 99;
    }
    .logout-zone:hover {
      background: #ff4d8c;
      transform: scale(1.05);
    }
    @media (max-width: 700px) {
      .wilzu-app { padding: 1rem; }
      .logo h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="bg-prime"></div>
<div class="grain"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- LOGIN ELEGANT -->
<div id="loginOverlay" class="login-master">
  <div class="card-login">
    <h2>WILZU</h2>
    <div class="subtitle">✦ enter the neoverse ✦</div>
    <input type="text" id="loginId" class="input-neo" placeholder="username / nickname" autocomplete="off">
    <input type="password" id="loginPwd" class="input-neo" placeholder="password (bebas)">
    <div id="loginErr" class="error-login"></div>
    <button id="doLoginNeo" class="btn-neo"><i class="fas fa-key"></i> UNLOCK PORTAL</button>
    <div class="demo-text">✨ isi kedua kolom, bebas — langsung masuk ke pengalaman baru ✨</div>
  </div>
</div>

<!-- MAIN APP UTAMA -->
<div id="wilzuMain" class="wilzu-app">
  <div class="glass-nav">
    <div class="logo">
      <h1>𝑾𝑰𝑳𝒁𝑼 𝑵𝑬𝑶</h1>
      <div class="status-badge"><i class="fas fa-bolt"></i> LIVE NOW</div>
    </div>
    <div class="status-badge"><i class="fab fa-spotify"></i> SURE THING • MIGUEL</div>
  </div>

  <!-- VIDEO PREMIUM -->
  <div class="video-verse">
    <video id="mainVideoHero" poster="https://files.catbox.moe/avfc3q.jpg" controls>
      <source src="https://files.catbox.moe/mnrpbr.mp4" type="video/mp4">
    </video>
    <div class="action-group">
      <select id="menuNeoSelect" class="select-custom">
        <option value="dashboard">⚡ DASHBOARD</option>
        <option value="premium">💎 PREMIUM ACCESS</option>
        <option value="about">🌀 TENTANG KAMI</option>
      </select>
      <button id="exploreNeoBtn" class="btn-glow"><i class="fas fa-compass"></i> JELAJAHI</button>
      <button id="telegramNeoTrigger" class="btn-glow" onclick="window.open('https://t.me/Willyishre_bot?start=_tgr_xPMBIpY5Yjhl','_blank')"><i class="fab fa-telegram"></i> TELEGRAM BOT</button>
    </div>
  </div>

  <!-- MUSIK SPOTIFY - SURE THING langsung muncul pas buka website -->
  <div class="music-floater">
    <iframe src="https://open.spotify.com/embed/track/0Nxx0HZcPr3yprf9tPXAY3?utm_source=generator&theme=0" 
            frameborder="0" allowfullscreen="" 
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
            loading="lazy"></iframe>
  </div>

  <!-- TIKTOK DOWNLOADER MODERN -->
  <div class="tiktok-neo">
    <h3 style="display: flex; gap: 10px;"><i class="fab fa-tiktok" style="font-size: 1.6rem;"></i> TikTok Downloader</h3>
    <p>tempel link video TikTok, dapatkan versi HD</p>
    <div class="flex-input">
      <input type="text" id="tiktokUrlNeo" class="input-urban" placeholder="https://www.tiktok.com/@user/video/123456789">
      <button id="fetchTikTokNeo" class="btn-glow"><i class="fas fa-cloud-download-alt"></i> Proses</button>
    </div>
    <div id="tiktokResultNeo" class="result-video"></div>
  </div>

  <footer>© 2025 WILZU • futuristik audio visual • supersonic vibe</footer>
  <div id="logoutNeoBtn" class="logout-zone"><i class="fas fa-sign-out-alt"></i> Exit</div>
</div>

<script>
  (function() {
    // LOGIN SYSTEM
    const loginScreen = document.getElementById('loginOverlay');
    const mainArea = document.getElementById('wilzuMain');
    const loginBtn = document.getElementById('doLoginNeo');
    const userLogin = document.getElementById('loginId');
    const passLogin = document.getElementById('loginPwd');
    const errDiv = document.getElementById('loginErr');

    function triggerLogin() {
      const user = userLogin.value.trim();
      const pwd = passLogin.value.trim();
      if (user === "" || pwd === "") {
        errDiv.innerText = "⚠️ isi kedua kolom untuk melanjutkan";
        return;
      }
      errDiv.innerText = "";
      loginScreen.classList.add('hidden');
      setTimeout(() => {
        loginScreen.style.display = 'none';
        mainArea.classList.add('active');
        document.body.style.overflow = 'auto';
      }, 600);
    }

    loginBtn.addEventListener('click', triggerLogin);
    const handleEnterLogin = (e) => { if(e.key === 'Enter') triggerLogin(); };
    userLogin.addEventListener('keypress', handleEnterLogin);
    passLogin.addEventListener('keypress', handleEnterLogin);

    // LOGOUT
    const logoutNeo = document.getElementById('logoutNeoBtn');
    logoutNeo.addEventListener('click', () => {
      mainArea.classList.remove('active');
      mainArea.style.display = 'none';
      loginScreen.style.display = 'flex';
      setTimeout(() => {
        loginScreen.classList.remove('hidden');
        loginScreen.style.opacity = '1';
        loginScreen.style.visibility = 'visible';
      }, 10);
      userLogin.value = '';
      passLogin.value = '';
      errDiv.innerText = '';
      document.body.style.overflow = 'hidden';
      document.getElementById('tiktokResultNeo').innerHTML = '';
    });

    // MENU LOGIC
    const selectMenu = document.getElementById('menuNeoSelect');
    const exploreBtn = document.getElementById('exploreNeoBtn');
    function showMenuDetail() {
      const val = selectMenu.value;
      let message = "";
      if(val === "dashboard") message = "📊 DASHBOARD: total tayangan 23.4K, pengguna aktif 1.2K, musik teratas: Sure Thing 🎵";
      else if(val === "premium") message = "💎 PREMIUM: download tanpa batas, akses video eksklusif, efek eksklusif, badge hologram. Hubungi bot Telegram!";
      else if(val === "about") message = "🌀 TENTANG KAMI: Wilzu adalah ruang kreatif dengan nuansa futuristik, support downloader & visual terbaik.";
      else message = "✨ pilih opsi yang tersedia";
      alert(message);
    }
    exploreBtn.addEventListener('click', showMenuDetail);

    // TIKTOK DOWNLOADER (API TikWM)
    const tiktokInput = document.getElementById('tiktokUrlNeo');
    const tiktokBtn = document.getElementById('fetchTikTokNeo');
    const resultDiv = document.getElementById('tiktokResultNeo');

    async function downloadTikTokNow() {
      const url = tiktokInput.value.trim();
      if (!url) {
        alert("Masukkan link TikTok dulu, lek!");
        return;
      }
      resultDiv.innerHTML = `<div style="display:flex; justify-content:center; gap:8px;"><i class="fas fa-spinner fa-pulse"></i> Memproses link...</div>`;
      try {
        const encoded = encodeURIComponent(url);
        const response = await fetch(`https://tikwm.com/api/?url=${encoded}`);
        const json = await response.json();
        if (json && json.data && json.data.play) {
          const videoUrl = json.data.play;
          resultDiv.innerHTML = `
            <div style="background: rgba(0,0,0,0.4); border-radius: 1.5rem; padding: 1rem;">
              <i class="fas fa-check-circle" style="color: #c084fc;"></i> <strong>Video berhasil diambil!</strong><br>
              <video controls style="max-width: 100%; border-radius: 1rem; margin: 12px 0;">
                <source src="${videoUrl}" type="video/mp4">
              </video><br>
              <a href="${videoUrl}" download class="download-btn"><i class="fas fa-download"></i> Download Sekarang</a>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `<div style="color:#ffaeae;">⚠️ Gagal, cek link atau coba lagi.</div>`;
        }
      } catch (error) {
        console.error(error);
        resultDiv.innerHTML = `<div style="color:#ff7b7b;">💀 Error koneksi atau server sibuk.</div>`;
      }
    }
    tiktokBtn.addEventListener('click', downloadTikTokNow);

    // Video interaksi
    const videoEl = document.getElementById('mainVideoHero');
    if(videoEl) {
      videoEl.addEventListener('click', () => {
        if(videoEl.paused) videoEl.play(); else videoEl.pause();
      });
    }

    // sedikit efek tambahan agar lebih hidup
    console.log("WILZU NEO | Spotify ready, music widget Sure Thing sudah terpasang");
  })();
</script>
</body>
</html>
